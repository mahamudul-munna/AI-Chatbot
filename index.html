<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Creamy AI Chatbot</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  >

</head>

<body>

  <div class="app">

    <!-- HEADER -->

    <header class="header">

      <div class="logo">
        AI
      </div>

      <div class="header-text">

        <h2>Creamy AI</h2>

        <p>Professional Assistant</p>

      </div>

      <button id="theme-btn">
        🌙
      </button>

    </header>

    <!-- CHAT AREA -->

    <main
      class="chat-box"
      id="chat-box"
    ></main>

    <!-- INPUT AREA -->

    <footer class="input-area">

      <input
        type="text"
        id="user-input"
        placeholder="Type your message..."
      >

      <button id="send-btn">
        ➤
      </button>

    </footer>

  </div>

  <script src="script.js"></script>

</body>
</html>
